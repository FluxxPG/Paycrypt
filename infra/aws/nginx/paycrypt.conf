server {
  listen 80;
  server_name _;

  # Simple liveness probe for container/ALB health checks.
  location = /nginx-ready {
    add_header Content-Type text/plain;
    return 200 "ok\n";
  }

  # API upstream (includes /ready, /health, /auth, /dashboard, /admin, /public, /v1).
  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 120s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 120s;
    proxy_pass http://api:4000;
  }

  # Socket.IO websocket and long-polling support.
  location /socket.io/ {
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 3600s;
    proxy_connect_timeout 10s;
    proxy_send_timeout 3600s;
    proxy_pass http://ws:4001;
  }
}
