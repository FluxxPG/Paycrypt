apiVersion: v1
kind: ConfigMap
metadata:
  name: edge-nginx-config
  namespace: paycrypt
  labels:
    app.kubernetes.io/name: edge-nginx
    app.kubernetes.io/part-of: paycrypt
data:
  nginx.conf: |
    events {
      worker_connections 4096;
    }

    http {
      server_tokens off;
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
      }

      upstream paycrypt_api {
        server api.paycrypt.svc.cluster.local:4000;
        keepalive 64;
      }

      upstream paycrypt_ws {
        server ws.paycrypt.svc.cluster.local:4001;
        keepalive 64;
      }

      server {
        listen 4000;

        location /socket.io/ {
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_read_timeout 75s;
          proxy_pass http://paycrypt_ws;
        }

        location / {
          proxy_http_version 1.1;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_read_timeout 60s;
          proxy_pass http://paycrypt_api;
        }
      }

      server {
        listen 4001;

        location / {
          proxy_http_version 1.1;
          proxy_set_header Upgrade $http_upgrade;
          proxy_set_header Connection $connection_upgrade;
          proxy_set_header Host $host;
          proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header X-Forwarded-Proto $scheme;
          proxy_read_timeout 75s;
          proxy_pass http://paycrypt_ws;
        }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: edge-nginx
  namespace: paycrypt
  labels:
    app.kubernetes.io/name: edge-nginx
    app.kubernetes.io/part-of: paycrypt
spec:
  ports:
    - name: api
      port: 4000
      targetPort: api
    - name: ws
      port: 4001
      targetPort: ws
  selector:
    app.kubernetes.io/name: edge-nginx
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: edge-nginx
  namespace: paycrypt
  labels:
    app.kubernetes.io/name: edge-nginx
    app.kubernetes.io/part-of: paycrypt
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: edge-nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: edge-nginx
        app.kubernetes.io/part-of: paycrypt
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: api
              containerPort: 4000
            - name: ws
              containerPort: 4001
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: api
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: api
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "NET_BIND_SERVICE", "SETGID", "SETUID"]
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
      volumes:
        - name: nginx-config
          configMap:
            name: edge-nginx-config
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
