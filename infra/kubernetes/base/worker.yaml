apiVersion: v1
kind: Service
metadata:
  name: worker
  namespace: paycrypt
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: paycrypt
spec:
  ports:
    - name: http
      port: 4002
      targetPort: http
  selector:
    app.kubernetes.io/name: worker
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: paycrypt
  labels:
    app.kubernetes.io/name: worker
    app.kubernetes.io/part-of: paycrypt
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        app.kubernetes.io/part-of: paycrypt
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: worker
          image: paycrypt-worker:current
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4002
          envFrom:
            - secretRef:
                name: paycrypt-runtime
          env:
            - name: NODE_ENV
              value: production
            - name: WORKER_PORT
              value: "4002"
            - name: REDIS_URL
              value: redis://redis:6379
            - name: WORKER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
