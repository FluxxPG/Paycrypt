apiVersion: v1
kind: Service
metadata:
  name: ws
  namespace: paycrypt
  labels:
    app.kubernetes.io/name: ws
    app.kubernetes.io/part-of: paycrypt
spec:
  ports:
    - name: http
      port: 4001
      targetPort: http
  selector:
    app.kubernetes.io/name: ws
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws
  namespace: paycrypt
  labels:
    app.kubernetes.io/name: ws
    app.kubernetes.io/part-of: paycrypt
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: ws
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ws
        app.kubernetes.io/part-of: paycrypt
    spec:
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: ws
          image: paycrypt-ws:current
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4001
          envFrom:
            - secretRef:
                name: paycrypt-runtime
          env:
            - name: NODE_ENV
              value: production
            - name: WS_PORT
              value: "4001"
            - name: REDIS_URL
              value: redis://redis:6379
            - name: WS_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
