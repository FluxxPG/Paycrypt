apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: paycrypt
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: paycrypt
spec:
  ports:
    - name: http
      port: 4000
      targetPort: http
  selector:
    app.kubernetes.io/name: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: paycrypt
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: paycrypt
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/part-of: paycrypt
    spec:
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: paycrypt-api:current
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
          envFrom:
            - secretRef:
                name: paycrypt-runtime
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: WORKER_PORT
              value: "4002"
            - name: REDIS_URL
              value: redis://redis:6379
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
