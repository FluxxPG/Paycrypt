apiVersion: v1
kind: ServiceAccount
metadata:
  name: aws-providerid-patcher
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: aws-providerid-patcher
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: aws-providerid-patcher
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: aws-providerid-patcher
subjects:
  - kind: ServiceAccount
    name: aws-providerid-patcher
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: aws-providerid-patcher
  namespace: kube-system
  labels:
    app.kubernetes.io/name: aws-providerid-patcher
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: aws-providerid-patcher
  template:
    metadata:
      labels:
        app.kubernetes.io/name: aws-providerid-patcher
    spec:
      serviceAccountName: aws-providerid-patcher
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      tolerations:
        - operator: Exists
      containers:
        - name: patcher
          image: bitnami/kubectl:1.30.2
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          command: ["/bin/sh", "-lc"]
          args:
            - |
              set -euo pipefail
              # Install curl for IMDS calls.
              if ! command -v curl >/dev/null 2>&1; then
                apt-get update && apt-get install -y curl >/dev/null 2>&1 || true
                apk add --no-cache curl >/dev/null 2>&1 || true
              fi

              TOKEN="$(curl -fsS -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")"
              IID="$(curl -fsS -H "X-aws-ec2-metadata-token: ${TOKEN}" http://169.254.169.254/latest/meta-data/instance-id)"
              AZ="$(curl -fsS -H "X-aws-ec2-metadata-token: ${TOKEN}" http://169.254.169.254/latest/meta-data/placement/availability-zone)"

              PROVIDER_ID="aws:///${AZ}/${IID}"
              echo "Patching node ${NODE_NAME} providerID=${PROVIDER_ID}"
              kubectl patch node "${NODE_NAME}" --type merge -p "{\"spec\":{\"providerID\":\"${PROVIDER_ID}\"}}"

              # Keep container alive to avoid crashloop; providerID won't change.
              sleep 3650d
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi

